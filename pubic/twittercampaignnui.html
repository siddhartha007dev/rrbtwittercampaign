<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission NTPC Result Campaign</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- SAARE STYLES YAHAN HAIN (No React Crash) -->
  <style>
    @keyframes marquee {
      0% {
        transform: translateX(100%);
      }

      100% {
        transform: translateX(-100%);
      }
    }

    .animate-marquee {
      display: inline-block;
      white-space: nowrap;
      animation: marquee 25s linear infinite;
    }

    @keyframes rotate-gradient {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    .premium-animated-border {
      background-image: linear-gradient(90deg, #1DA1F2, #7928CA, #FF007F, #1DA1F2, #17BF63);
      background-size: 300% 300%;
      animation: rotate-gradient 4s ease infinite;
    }

    @keyframes tier-pulse-gold {

      0%,
      100% {
        box-shadow: 0 0 15px rgba(234, 179, 8, 0.4);
        transform: scale(1);
      }

      50% {
        box-shadow: 0 0 35px rgba(234, 179, 8, 0.8);
        transform: scale(1.01);
      }
    }

    .anim-tier-gold {
      animation: tier-pulse-gold 2.5s ease-in-out infinite;
    }

    @keyframes tier-pulse-plat {

      0%,
      100% {
        box-shadow: 0 0 20px rgba(34, 211, 238, 0.5);
        transform: scale(1);
      }

      50% {
        box-shadow: 0 0 45px rgba(34, 211, 238, 0.9);
        transform: scale(1.02);
      }
    }

    .anim-tier-plat {
      animation: tier-pulse-plat 1.5s ease-in-out infinite;
    }

    .text-shadow-glow {
      text-shadow: 0 0 10px rgba(59, 130, 246, 0.8);
    }

    @keyframes float-up {
      0% {
        transform: translateY(20px) scale(0.8);
        opacity: 0;
      }

      20% {
        transform: translateY(0px) scale(1.1);
        opacity: 1;
      }

      80% {
        transform: translateY(-30px) scale(1);
        opacity: 1;
      }

      100% {
        transform: translateY(-50px) scale(0.9);
        opacity: 0;
      }
    }

    .animate-float-up {
      animation: float-up 2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    @keyframes banner-pop {
      0% {
        transform: scale(0.5) translateY(-100px);
        opacity: 0;
      }

      40% {
        transform: scale(1.1) translateY(10px);
        opacity: 1;
      }

      60% {
        transform: scale(0.95) translateY(0);
        opacity: 1;
      }

      100% {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }

    .animate-banner-pop {
      animation: banner-pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes starburst {
      0% {
        transform: scale(0) rotate(0deg);
        opacity: 1;
      }

      100% {
        transform: scale(3) rotate(90deg);
        opacity: 0;
      }
    }

    .animate-starburst {
      animation: starburst 1.5s ease-out forwards;
    }

    @keyframes slide-in-right {
      0% {
        transform: translateX(100%);
        opacity: 0;
      }

      100% {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .animate-slide-right {
      animation: slide-in-right 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-10px);
      }

      75% {
        transform: translateX(10px);
      }
    }

    .animate-shake {
      animation: shake 0.4s ease-in-out;
    }

    @keyframes map-float {
      0% {
        transform: translateY(0) scale(1);
        opacity: 0;
      }

      20% {
        opacity: 0.6;
      }

      80% {
        opacity: 0.6;
      }

      100% {
        transform: translateY(-60px) scale(1.5);
        opacity: 0;
      }
    }

    .map-particle {
      position: absolute;
      border-radius: 50%;
      animation: map-float 4s infinite linear;
      filter: blur(2px);
    }

    .confetti-particle {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 2px;
      left: 50%;
      top: 50%;
      opacity: 1;
    }

    @keyframes explode-particle {
      0% {
        transform: translate(0, 0) scale(1) rotate(0deg);
        opacity: 1;
      }

      100% {
        transform: translate(var(--tx), var(--ty)) scale(0) rotate(var(--rot));
        opacity: 0;
      }
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #15202b;
    }

    ::-webkit-scrollbar-thumb {
      background: #38444d;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #1DA1F2;
    }

    /* --- HOTSTAR LIVE CHAT CSS --- */
    .chat-mask {
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 100%);
      mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 100%);
    }

    @keyframes chat-float-up {
      0% {
        transform: translateY(20px);
        opacity: 0;
      }

      100% {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .animate-chat-float {
      animation: chat-float-up 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    @keyframes flying-emoji {
      0% {
        transform: translateY(0) scale(0.5) rotate(0deg);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      80% {
        transform: translateY(-200px) scale(1.3) rotate(var(--rot-end));
        opacity: 0.8;
      }

      100% {
        transform: translateY(-250px) scale(1) rotate(var(--rot-end));
        opacity: 0;
      }
    }

    .floating-emoji-anim {
      position: absolute;
      animation: flying-emoji 2.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      pointer-events: none;
      z-index: 50;
    }

    /* --- NEW ANIMATIONS FOR MODAL & CONFETTI --- */
    @keyframes explode-particle {
      0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(var(--rot)); opacity: 0; }
    }

    @keyframes modal-in {
      0% { transform: scale(0.95) translateY(20px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    .animate-modal-in { animation: modal-in 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }

    @keyframes slide-down-bounce {
      0% { transform: translateY(-150%) scale(0.5); opacity: 0; }
      70% { transform: translateY(10%) scale(1.05); opacity: 1; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }

    @keyframes alert-shine {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    @keyframes boost-pulse {
      0% { transform: scale(1); box-shadow: 0 0 20px rgba(239, 68, 68, 0.5); }
      50% { transform: scale(1.03); box-shadow: 0 0 50px rgba(239, 68, 68, 0.8); }
      100% { transform: scale(1); box-shadow: 0 0 20px rgba(239, 68, 68, 0.5); }
    }

    .animate-slide-down-bounce {
      animation: slide-down-bounce 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .shining-overlay {
      position: absolute;
      top: 0;
      width: 60%;
      height: 100%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.55), transparent);
      transform: skewX(-25deg);
      animation: alert-shine 2.5s infinite ease-out;
      pointer-events: none;
    }

    .confetti-particle {
      position: absolute;
      border-radius: 2px;
      left: 50%;
      top: 50%;
      opacity: 1;
    }
  </style>
</head>

    const { useState, useEffect, useRef, useMemo } = React;

    const IconWrapper = ({ children, className = '', ...props }) => (

    const Heart = (props) => <IconWrapper {...props}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" /></IconWrapper>;
    const Repeat2 = (props) => <IconWrapper {...props}><path d="m2 9 3-3 3 3" /><path d="M13 18H7a2 2 0 0 1-2-2V6" /><path d="m22 15-3 3-3-3" /><path d="M11 6h6a2 2 0 0 1 2 2v10" /></IconWrapper>;

    const MessageSquare = (props) => <IconWrapper {...props}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" /></IconWrapper>;
    const Send = (props) => <IconWrapper {...props}><path d="m22 2-7 20-4-9-9-4Z" /><path d="M22 2 11 13" /></IconWrapper>;
    const Settings = (props) => <IconWrapper {...props}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" /><circle cx="12" cy="12" r="3" /></IconWrapper>;
    const AlertTriangle = (props) => <IconWrapper {...props}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" /><path d="M12 9v4" /><path d="M12 17h.01" /></IconWrapper>;
    const Zap = (props) => <IconWrapper {...props}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" /></IconWrapper>;
    const Bell = (props) => <IconWrapper {...props}><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" /><path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.17V11a6 6 0 0 0-5-5.91V4a1 1 0 1 0-2 0v1.09A6 6 0 0 0 6 11v3.17a2 2 0 0 1-.6 1.43L4 17h5" /></IconWrapper>;
    const Award = (props) => <IconWrapper {...props}><circle cx="12" cy="8" r="7" /><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88" /></IconWrapper>;
    const X = (props) => <IconWrapper {...props}><path d="M18 6 6 18" /><path d="m6 6 12 12" /></IconWrapper>;
    const ShieldAlert = (props) => <IconWrapper {...props}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /><path d="M12 8v4" /><path d="M12 16h.01" /></IconWrapper>;
    const Upload = (props) => <IconWrapper {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="17 8 12 3 7 8" /><line x1="12" y1="3" x2="12" y2="15" /></IconWrapper>;
    const CheckCircle2 = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="10" /><path d="m9 12 2 2 4-4" /></IconWrapper>;
    const Activity = (props) => <IconWrapper {...props}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12" /></IconWrapper>;
    const Lock = (props) => <IconWrapper {...props}><rect width="18" height="11" x="3" y="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></IconWrapper>;
    const Plus = (props) => <IconWrapper {...props}><path d="M5 12h14" /><path d="M12 5v14" /></IconWrapper>;
    const User = (props) => <IconWrapper {...props}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></IconWrapper>;
    const Star = (props) => <IconWrapper {...props}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" /></IconWrapper>;
    const Crown = (props) => <IconWrapper {...props}><path d="M2 4l3 12h14l3-12-6 7-4-7-4 7-6-7zm3 16h14" /></IconWrapper>;
    const Gem = (props) => <IconWrapper {...props}><path d="M6 3h12l4 6-10 13L2 9Z" /><path d="M11 3v19" /><path d="M13 3v19" /><path d="M2 9h20" /><path d="M6 3v6" /><path d="M18 3v6" /></IconWrapper>;
    const Trophy = (props) => <IconWrapper {...props}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6" /><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18" /><path d="M4 22h16" /><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22" /><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22" /><path d="M18 2H6v7c0 6 6 8 6 8s6-2 6-8V2Z" /></IconWrapper>;
    const MapIcon = (props) => <IconWrapper {...props}><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21 3 6" /><line x1="9" y1="3" x2="9" y2="18" /><line x1="15" y1="6" x2="15" y2="21" /></IconWrapper>;
    const FileText = (props) => <IconWrapper {...props}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" /><polyline points="14 2 14 8 20 8" /><line x1="16" y1="13" x2="8" y2="13" /><line x1="16" y1="17" x2="8" y2="17" /><line x1="10" y1="9" x2="8" y2="9" /></IconWrapper>;
    const Sparkles = (props) => <IconWrapper {...props}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></IconWrapper>;
    const Clock = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></IconWrapper>;
    const UserPlus = (props) => <IconWrapper {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" x2="19" y1="8" y2="14"/><line x1="22" x2="16" y1="11" y2="11"/></IconWrapper>;

    // Helper: Extract ID from Twitter URL
    const extractTweetId = (url) => {
      if (!url) return '1234567890';
      const match = url.match(/\/status\/(\d+)/);
      return match ? match[1] : url.trim();
    };

    // Quote intent: remove target tweet URLs from body so we don't duplicate the permalink (saves chars + avoids broken embed).
    const stripTweetUrlsForId = (text, tweetId) => {
      if (!text || !tweetId) return String(text || '').trim();
      let out = String(text);
      const id = String(tweetId).replace(/\D/g, '') || String(tweetId);
      const esc = id.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      out = out.replace(new RegExp(`https?://(?:twitter\\.com|x\\.com)/[^\\s]*/status/${esc}(?:\\?[^\\s]*)?`, 'gi'), '');
      out = out.replace(new RegExp(`https?://(?:twitter\\.com|x\\.com)/i/web/status/${esc}(?:\\?[^\\s]*)?`, 'gi'), '');
      return out.replace(/\s+/g, ' ').trim();
    };

    // --- MOCK DATA GENERATOR ---
    const generateMockCards = (type, count) => {
      return Array.from({ length: count }).map((_, i) => ({
        id: `${type}-demo-${i}`,
        type: type,
        text: type === 'tweet' ? `Students ke future ke sath khilwad band karo. We want justice! Part ${i + 1} 🚀 #Declare_RRBNTPC2024_Result` : (type === 'retweet' ? `NTPC Results mein dhandhli nahi chalegi. Sabhi students sath aayein! (Tweet ${i + 1}) 📚` : `Sir, students pareshan hain. Kripya NTPC results par dhyan dein! (Reply ${i + 1}) #Declare_RRBNTPC2024_Result`),
        postLink: type !== 'tweet' ? `https://twitter.com/teacher_${i + 1}/status/123456789${i}` : '',
        targetId: `1234567890${i}`,
        completed: false
      }));
    };

    const INITIAL_TWEETS = generateMockCards('tweet', 25);
    const INITIAL_RETWEETS = generateMockCards('retweet', 22);
    const INITIAL_QUOTES = generateMockCards('quote', 20);
    const INITIAL_REPLIES = generateMockCards('reply', 20);

    const ACHIEVEMENTS = [
      { count: 5, name: "Bronze Tweeter 🥉", desc: "Shuruaat achi hui hai!" },
      { count: 15, name: "Silver Amplifier 🥈", desc: "Aap trend set kar rahe hain!" },
      { count: 30, name: "Gold Campaigner 🥇", desc: "Rukna nahi hai, you are on fire!" },
      { count: 50, name: "Diamond Legend 💎", desc: "Aapne toh system hila diya!" }
    ];

    // Features List for Modal
    const CAMPAIGN_FEATURES = [
        { icon: Zap, title: "Super Fast (One-Click)", desc: "Bina kisi copy-paste ke turant auto-fill Tweets aur Retweets karein. Time bachega, speed badhegi." },
        { icon: ShieldAlert, title: "Smart Anti-Ban Shield", desc: "In-built cooldown timer aur text-randomizer features ke sath apne account ko suspension se fully safe rakhein." },
        { icon: MessageSquare, title: "Live Community Interaction", desc: "Real-time chat aur floating animations ke zariye desh bhar ke sabhi candidates ke sath judein aur ek-dusre ko motivate karein." },
        { icon: TrendingUp, title: "Real-Time Analytics", desc: "Campaign ka total impact (Global stats) aur apna personal yogdaan ekdum transparent dashboard par LIVE dekhein." },
        { icon: MapIcon, title: "Gamified Journey", desc: "To make the campaign interactive and engaging." }

    const useCountdown = (targetDateString) => {
      const [timeLeft, setTimeLeft] = useState({ d: '00', h: '00', m: '00', s: '00' });
      
      useEffect(() => {
        const targetDate = new Date(targetDateString).getTime();
        const interval = setInterval(() => {
          const now = new Date().getTime();
          const distance = targetDate - now;
          if (distance < 0) { clearInterval(interval); return; }
          setTimeLeft({
            d: String(Math.floor(distance / (1000 * 60 * 60 * 24))).padStart(2, '0'),
            h: String(Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, '0'),
            m: String(Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0'),
            s: String(Math.floor((distance % (1000 * 60)) / 1000)).padStart(2, '0')
          });
        }, 1000);
        return () => clearInterval(interval);
      }, [targetDateString]);
      
      return timeLeft;

    // MAIN APP
    function App() {

      // --- GLOBAL TELEGRAM ESCAPE ---
      const [isTelegramBlocker, setIsTelegramBlocker] = useState(false);
      useEffect(() => {
        const ua = navigator.userAgent || '';
        const isTg = /Telegram/i.test(ua) || /TelegramBot/i.test(ua) || (typeof window !== 'undefined' && window.TelegramWebviewProxy !== undefined);
        if (isTg && /Android/i.test(ua)) {
          setIsTelegramBlocker(true);
          // Try to escape automatically on load
          const noScheme = window.location.href.replace(/^https?:\/\//i, '');
          const intentUri = `intent://${noScheme}#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url=${encodeURIComponent(window.location.href)};end`;
          window.location.href = intentUri;
        }
      }, []);

      // Never read previewDemo from localStorage on load — that bypassed pre-launch and opened campaign directly.
      const [previewDemo, setPreviewDemoState] = useState(false);

      const setPreviewDemo = (val) => {
        setPreviewDemoState(val);
        if (val) localStorage.setItem('campaign_previewDemo', 'true');
        else localStorage.removeItem('campaign_previewDemo');
      };
      const [activeTab, setActiveTab] = useState('tweets');
      const [isLiveMode, setIsLiveMode] = useState(() => localStorage.getItem('campaign_isLiveMode') === 'true');

      const handleModeChange = async (mode) => {
        const live = !!mode;
        setIsLiveMode(live);
        localStorage.setItem('campaign_isLiveMode', String(live));
        setConfig(prev => ({ ...prev, useLiveData: live }));
        try {
          await fetch('/api/config', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ useLiveData: live })
          });
        } catch (e) { console.error('Mode sync failed', e); }
        fetchLiveData();
      };

      // DATA STATES
      const [demoStats, setDemoStats] = useState(() => {
        const saved = localStorage.getItem('campaign_demoStats');
        return saved ? JSON.parse(saved) : { tweets: 0, retweets: 0, quotes: 0, replies: 0 };
      });
      useEffect(() => {
        localStorage.setItem('campaign_demoStats', JSON.stringify(demoStats));
      }, [demoStats]);

      const [liveStats, setLiveStats] = useState({ tweets: 0, retweets: 0, quotes: 0, replies: 0 });

      const [demoUserStats, setDemoUserStats] = useState(() => {
        const saved = localStorage.getItem('campaign_demoUserStats');
        return saved ? JSON.parse(saved) : { tweets: 0, retweets: 0, quotes: 0, replies: 0 };
      });
      useEffect(() => {
        localStorage.setItem('campaign_demoUserStats', JSON.stringify(demoUserStats));
      }, [demoUserStats]);

      const [liveUserStats, setLiveUserStats] = useState({ tweets: 0, retweets: 0, quotes: 0, replies: 0 });
      // Pre-launch registrations should always come from backend (single source of truth).
      const [regCount, setRegCount] = useState(0);
      const [hasRegisteredFromIP, setHasRegisteredFromIP] = useState(false);

      const [config, setConfig] = useState({
        isActive: true,
        isPreLaunch: true,
        useLiveData: true,
        allowDemo: true,
        breakingNews: "🚨 Mega Trend Started: Target 1 Million Tweets for #Declare_RRBNTPC2024_Result! Keep Tweeting!",
        posterMessage: "Campaign temporarily paused. Hum jaldi wapas aayenge!",
        redAlertLine: "Campaign Halted"
      });
      const [dismissedAlertType, setDismissedAlertType] = useState(null);

      // Classic: local LIVE flag; after campaign go-live (`!isPreLaunch`) everyone is on real DB. Pre-launch me Enter Demo tab tak DEMO.
      const effectiveIsLiveMode = useMemo(
        () => !config.isPreLaunch || isLiveMode,
        [config.isPreLaunch, isLiveMode]
      );

      useEffect(() => {
        if (!config.isPreLaunch) {
          setIsLiveMode(true);
          localStorage.setItem('campaign_isLiveMode', 'true');
        }
      }, [config.isPreLaunch]);

      useEffect(() => {
        if (!config?.adminAlert || config.adminAlert === 'none') {
          setDismissedAlertType(null);
          return;
        }
        if (dismissedAlertType && dismissedAlertType !== config.adminAlert) {
          setDismissedAlertType(null);
        }
      }, [config?.adminAlert, dismissedAlertType]);

      const [demoCompletedIds, setDemoCompletedIds] = useState(() => {
        const saved = localStorage.getItem('campaign_demoCompletedIds');
        return saved ? JSON.parse(saved) : [];
      });
      useEffect(() => {
        localStorage.setItem('campaign_demoCompletedIds', JSON.stringify(demoCompletedIds));
      }, [demoCompletedIds]);

      const [demoTweets, setDemoTweets] = useState(() => 
        INITIAL_TWEETS.map(t => ({ ...t, completed: demoCompletedIds.includes(t.id) }))
      );
      const [demoRetweets, setDemoRetweets] = useState(() => 
        INITIAL_RETWEETS.map(t => ({ ...t, completed: demoCompletedIds.includes(t.id) }))
      );
      const [demoQuotes, setDemoQuotes] = useState(() => 
        INITIAL_QUOTES.map(t => ({ ...t, completed: demoCompletedIds.includes(t.id) }))
      );
      const [demoReplies, setDemoReplies] = useState(() => 
        INITIAL_REPLIES.map(t => ({ ...t, completed: demoCompletedIds.includes(t.id) }))
      );

      const [liveTweets, setLiveTweets] = useState([]);
      const [liveRetweets, setLiveRetweets] = useState([]);
      const [liveQuotes, setLiveQuotes] = useState([]);
      const [liveReplies, setLiveReplies] = useState([]);
      const [liveCompletedIds, setLiveCompletedIds] = useState([]);
      const [isLiveLoading, setIsLiveLoading] = useState(true);
      const [hasHydratedFromCache, setHasHydratedFromCache] = useState(false);

      const stats = effectiveIsLiveMode ? liveStats : demoStats;
      const userStats = effectiveIsLiveMode ? liveUserStats : demoUserStats;

      const tweets = effectiveIsLiveMode ? liveTweets : demoTweets;
      const retweets = effectiveIsLiveMode ? liveRetweets : demoRetweets;
      const quotes = effectiveIsLiveMode ? liveQuotes : demoQuotes;
      const replies = effectiveIsLiveMode ? liveReplies : demoReplies;

      const [demoLevels, setDemoLevels] = useState({ tweets: 1, retweets: 1, quotes: 1, replies: 1 });

      const levels = effectiveIsLiveMode ? liveLevels : demoLevels;

      const [liveRounds, setLiveRounds] = useState({ tweets: 1, retweets: 1, quotes: 1, replies: 1 });
      const [demoRounds, setDemoRounds] = useState(() => {
        const saved = localStorage.getItem('campaign_demoRounds');
        return saved ? JSON.parse(saved) : { tweets: 1, retweets: 1, quotes: 1, replies: 1 };
      });
      useEffect(() => {
        localStorage.setItem('campaign_demoRounds', JSON.stringify(demoRounds));
      }, [demoRounds]);
      
      const rounds = effectiveIsLiveMode ? liveRounds : demoRounds;

      const [combo, setCombo] = useState(0);
      const [demoTotalClicks, setDemoTotalClicks] = useState(() => {
        const saved = localStorage.getItem('campaign_demoTotalClicks');
        return saved ? parseInt(saved) : 0;
      });
      useEffect(() => {
        localStorage.setItem('campaign_demoTotalClicks', demoTotalClicks.toString());
      }, [demoTotalClicks]);

      const [liveTotalClicks, setLiveTotalClicks] = useState(0);
      const totalClicks = effectiveIsLiveMode ? liveTotalClicks : demoTotalClicks;
      const [celebration, setCelebration] = useState(null);
      const [activeBadge, setActiveBadge] = useState(null);
      const [unlockedBadges, setUnlockedBadges] = useState([]);

      const advancingRoundsRef = useRef({ tweets: false, retweets: false, quotes: false, replies: false });

      useEffect(() => {
        if (!effectiveIsLiveMode) {
          const checkRoundAdvanceDemo = (type, items) => {
            if (items.length > 0 && items.every(c => c.completed)) {
              if (!advancingRoundsRef.current[type]) {
                advancingRoundsRef.current[type] = true;
                
                const itemIds = items.map(c => c.id || c._id);
                setDemoCompletedIds(prev => prev.filter(id => !itemIds.includes(id)));
                setDemoRounds(prev => ({ ...prev, [type]: prev[type] + 1 }));
                
                setTimeout(() => { advancingRoundsRef.current[type] = false; }, 500);
              }
            }
          };
          checkRoundAdvanceDemo('tweets', demoTweets);
          checkRoundAdvanceDemo('retweets', demoRetweets);
          checkRoundAdvanceDemo('quotes', demoQuotes);
          checkRoundAdvanceDemo('replies', demoReplies);
          return;
        }

        const checkRoundAdvance = (type, items) => {
          if (items.length > 0 && items.every(c => c.completed)) {
            if (!advancingRoundsRef.current[type]) {
              advancingRoundsRef.current[type] = true;
              fetch('/api/action/next-round', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type })
              }).then(res => res.json()).then(data => {
                if (data.success) {
                  // Single source of truth: just refresh everything from server
                  fetchLiveData();
                }
                // Longer mutex to prevent rapid re-fires
                setTimeout(() => { advancingRoundsRef.current[type] = false; }, 4000);
              }).catch(() => { 
                setTimeout(() => { advancingRoundsRef.current[type] = false; }, 4000);
              });
            }
          }
        };

        checkRoundAdvance('tweets', liveTweets);
        checkRoundAdvance('retweets', liveRetweets);
        checkRoundAdvance('quotes', liveQuotes);
        checkRoundAdvance('replies', liveReplies);
      }, [liveTweets, liveRetweets, liveQuotes, liveReplies, demoTweets, demoRetweets, demoQuotes, demoReplies, effectiveIsLiveMode]);

      // Update Demo card lists when completed IDs change (to keep them in sync if needed)
      useEffect(() => {
        setDemoTweets(prev => prev.map(t => ({ ...t, completed: demoCompletedIds.includes(t.id) })));
        setDemoRetweets(prev => prev.map(t => ({ ...t, completed: demoCompletedIds.includes(t.id) })));

        setDemoReplies(prev => prev.map(t => ({ ...t, completed: demoCompletedIds.includes(t.id) })));
      }, [demoCompletedIds]);

      const [tapCount, setTapCount] = useState(0);
      const [showPasswordGate, setShowPasswordGate] = useState(false);
      const [passwordInput, setPasswordInput] = useState('');
      const [passError, setPassError] = useState(false);
      const [isAdminOpen, setIsAdminOpen] = useState(false);

      const [newItem, setNewItem] = useState({ type: 'tweet', text: '', postLink: '' });
      const [bulkText, setBulkText] = useState('');
      const [comboLinks, setComboLinks] = useState('');

      const generateContent = () => {
        const TWITTER_LIMIT = 280;
        const sep = '\n\n';
        const hashtag = (watchdogInfo.hashtag || '#Declare_RRBNTPC2024_Result').trim() || '#Declare_RRBNTPC2024_Result';
        const mandatoryHashtag = hashtag.startsWith('#') ? hashtag : `#${hashtag}`;

        const normalize = (s) => String(s || '')
          .replace(/cbt\s*1\s*results?/gi, 'results')
          .replace(/\s+/g, ' ')
          .trim();
        const escapeRegex = (s) => String(s).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const ensureMandatoryHashtag = (text) => {
          const out = normalize(text);
          if (!out) return mandatoryHashtag;
          if (new RegExp(`^${escapeRegex(mandatoryHashtag)}(?=\\s|$)`, 'i').test(out)) return out;
          const re = new RegExp(`(^|\\s)${escapeRegex(mandatoryHashtag)}(?=\\s|$)`, 'i');
          if (re.test(out)) return out;
          return normalize(`${mandatoryHashtag}${sep}${out}`);
        };

        const sentencePool = () => {
          const allPoolSentences = Array.from(new Set([...(msgParts.upper || []), ...(msgParts.middle || []), ...(msgParts.lower || [])].filter(s => s && s.trim().length > 0)));
          const fallbacks = [
            'Lakhon students intezaar kar rahe hain authorities se appeal hai result declare karein.',
            'Hume justice aur transparency chahiye ab aur wait nahi.',
            'RRB result mien itni deri kyun ho rahi hai jawab do.',
            'Students ke future ke sath mat khelo exams clear hone ke baad bhi.',
            "It's been so long, we intensely demand clarity from officials.",
            'Board ko humari genuine maangeni jald sunni padegi.',
            'Time barbaad ho raha hai candidates ki umar nikal rahi hai.',
            'Fast execution and timely results are the right of every aspirant.',
            'Parivar aur students ki mental tension roj badhti ja rahi hai.',
            'Please clear the results NOW and officially release the full timeline!',
            'Dhyan de ki RRB delay ke karan lakho yuvao ka bhavishya ruka hai.',
            'Jaldi results nikal kar joining process shuru karo yahi maang hai.'
          ];
          return allPoolSentences.length >= 6 ? allPoolSentences : Array.from(new Set([...allPoolSentences, ...fallbacks]));
        };

        // Priority: (1) mandatory hashtag FIRST in text (Android intent often drops end of long URL/text) (2) body (3) @mentions only — static then max 1 dynamic.
        const buildBodyParts = (maxLen) => {
          const pool = [...sentencePool()].sort(() => 0.5 - Math.random());
          const parts = [];
          for (const sent of pool) {
            const s = normalize(sent);
            if (!s) continue;
            const candidate = normalize(parts.length ? [...parts, s].join(' ') : s);
            if (candidate.length <= maxLen) parts.push(s);
            else break;
          }
          return parts;
        };

        const buildMentionsLine = (maxLen) => {
          if (maxLen <= 0) return '';
          const tokens = [];
          const used = new Set();
          const lineLen = () => normalize(tokens.join(' ')).length;
          const tryAdd = (raw) => {
            const x = normalize(raw);
            if (!x || used.has(x.toLowerCase())) return false;
            if (x.toLowerCase() === mandatoryHashtag.toLowerCase()) return false;
            tokens.push(x);
            used.add(x.toLowerCase());
            if (lineLen() > maxLen) {
              tokens.pop();
              used.delete(x.toLowerCase());
              return false;
            }
            return true;
          };
          for (const t of (getTagPools.staticPinned || [])) tryAdd(t);
          for (const t of [...(getTagPools.staticPool || [])].sort(() => 0.5 - Math.random())) tryAdd(t);
          let addedDyn = false;
          for (const t of (getTagPools.dynamicPinned || [])) {
            if (tryAdd(t)) { addedDyn = true; break; }
          }
          if (!addedDyn) {
            for (const t of [...(getTagPools.dynamicPool || [])].sort(() => 0.5 - Math.random())) {
              if (tryAdd(t)) break;
            }
          }
          return normalize(tokens.join(' '));
        };

        const proseFingerprint = (full) => {
          const seg = full.split(sep);
          const prose = seg[1] || '';
          return normalize(prose.replace(/#[A-Za-z0-9_]+/g, '').trim());
        };

        const composeOne = () => {
          const must = mandatoryHashtag;
          const overhead = must.length + sep.length + sep.length;
          let maxBody = TWITTER_LIMIT - overhead - 24;
          if (maxBody < 50) maxBody = 50;
          let parts = buildBodyParts(maxBody);
          if (parts.length === 0) parts = [normalize(sentencePool()[0] || must)];

          const shrinkTagsThenBody = (bodyParts) => {
            let bp = [...bodyParts];
            for (let guard = 0; guard < 40 && bp.length; guard++) {
              const bodyStr = normalize(bp.join(' '));
              const remMen = TWITTER_LIMIT - overhead - bodyStr.length;
              const mentions = buildMentionsLine(Math.max(0, remMen));
              const full = mentions
                ? `${must}${sep}${bodyStr}${sep}${mentions}`
                : `${must}${sep}${bodyStr}`;
              if (full.length <= TWITTER_LIMIT) return ensureMandatoryHashtag(full);
              bp.pop();
            }
            let bodyStr = normalize(bp.join(' ')) || normalize(sentencePool()[0] || must);
            let remMen = TWITTER_LIMIT - overhead - bodyStr.length;
            let mentions = buildMentionsLine(Math.max(0, remMen));
            let full = mentions ? `${must}${sep}${bodyStr}${sep}${mentions}` : `${must}${sep}${bodyStr}`;
            for (let s = 0; s < 60 && full.length > TWITTER_LIMIT && bodyStr.length > 24; s++) {
              const cut = bodyStr.lastIndexOf(' ');
              bodyStr = (cut > 20 ? bodyStr.slice(0, cut) : bodyStr.slice(0, Math.max(20, bodyStr.length - 12))).trim();
              remMen = TWITTER_LIMIT - overhead - bodyStr.length;
              mentions = buildMentionsLine(Math.max(0, remMen));
              full = mentions ? `${must}${sep}${bodyStr}${sep}${mentions}` : `${must}${sep}${bodyStr}`;
            }
            if (full.length > TWITTER_LIMIT) {
              remMen = Math.max(0, TWITTER_LIMIT - overhead - bodyStr.length);
              mentions = buildMentionsLine(remMen);
              full = mentions ? `${must}${sep}${bodyStr}${sep}${mentions}` : `${must}${sep}${bodyStr}`;
            }
            return ensureMandatoryHashtag(full.length > TWITTER_LIMIT ? full.slice(0, TWITTER_LIMIT) : full);
          };

          return shrinkTagsThenBody(parts);
        };

        for (let i = 0; i < 150; i++) {
          const candidate = composeOne();
          const bodyNoHash = proseFingerprint(candidate);
          if (!usedAutoBodiesRef.current.has(bodyNoHash)) {
            usedAutoMessagesRef.current.add(candidate);
            usedAutoBodiesRef.current.add(bodyNoHash);
            return ensureMandatoryHashtag(candidate);
          }
        }

        const candidate = composeOne();
        usedAutoMessagesRef.current.add(candidate);
        usedAutoBodiesRef.current.add(proseFingerprint(candidate));
        return ensureMandatoryHashtag(candidate);
      };

      const getOrGenerateContentForId = (id) => {

          const res = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },

      // Poll config + stats so Demo/LIVE and admin changes propagate to every device.
      useEffect(() => {
        fetchLiveData();

        return () => clearInterval(interval);
      }, []);

      const { currentCards, cardPageLevel } = useMemo(() => {
        let sourceArray = [];
        if (activeTab === 'tweets') sourceArray = tweets;
        if (activeTab === 'retweets') sourceArray = retweets;
        if (activeTab === 'quotes') sourceArray = quotes;
        if (activeTab === 'replies') sourceArray = replies;

        let overrideLevel = 1;
        let cCount = 0;
        for (let i = 0; i < sourceArray.length; i++) {
            if (sourceArray[i].completed) {
                cCount++;
                if (cCount >= CARDS_PER_LEVEL) {
                    overrideLevel++;
                    cCount = 0;
                }
            } else {
                break; // Stop at the first uncompleted card to perfectly pinpoint active level!
            }
        }

        const maxLevel = Math.max(1, Math.ceil((sourceArray.length || 0) / CARDS_PER_LEVEL) || 1);
        const safeLevel = Math.min(overrideLevel, maxLevel);
        const startIndex = (safeLevel - 1) * CARDS_PER_LEVEL;
        const endIndex = safeLevel * CARDS_PER_LEVEL;
        return { currentCards: sourceArray.slice(startIndex, endIndex), cardPageLevel: safeLevel };
      }, [activeTab, tweets, retweets, quotes, replies]);

      const getUserTier = (tweetsCount) => {

        const levelCompleteCount = Math.floor(tweetsCount / CARDS_PER_LEVEL);
        
        // Transition happens exactly when crossing 2 levels!
        const tierIndex = Math.floor(levelCompleteCount / 2);

        if (tierIndex === 0) return {

      const handleBulkUpload = async () => {

      const handleDeleteItem = async (type, id) => {

          else if (type === 'retweet') setDemoRetweets(demoRetweets.filter(t => t.id !== id));
          else if (type === 'reply') setDemoReplies(demoReplies.filter(t => t.id !== id));
        }
      };

      const triggerAction = async (type, item) => {
        if (item.completed || cooldown > 0) return;

        const arrSnapshot = effectiveIsLiveMode ? liveTweets : demoTweets;
        const cardIndex = arrSnapshot.findIndex(t => (t.id || t._id) === (item.id || item._id));

        if (config.actionTimerSeconds > 0) {
          setCooldown(config.actionTimerSeconds);
        }

        const markCompleted = (list) => list.map(t => { const tId = t.id || t._id; const iId = item.id || item._id; return (tId && iId && tId === iId) ? { ...t, completed: true } : t; });

        if (effectiveIsLiveMode) {
          // Optimistically mark completed in UI instantly
          if (type === 'tweet') setLiveTweets(markCompleted(liveTweets));
          if (type === 'retweet') setLiveRetweets(markCompleted(liveRetweets));
          if (type === 'quote') setLiveQuotes(markCompleted(liveQuotes));
          if (type === 'reply') setLiveReplies(markCompleted(liveReplies));
          // Also add to liveCompletedIds so fetchLiveData polls don't revert it
          const itemId = item.id || item._id;
          if (itemId) setLiveCompletedIds(prev => prev.includes(String(itemId)) ? prev : [...prev, String(itemId)]);
        } else {
          if (type === 'tweet') setDemoTweets(markCompleted(demoTweets));
          if (type === 'retweet') setDemoRetweets(markCompleted(demoRetweets));
          if (type === 'quote') setDemoQuotes(markCompleted(demoQuotes));
          if (type === 'reply') setDemoReplies(markCompleted(demoReplies));
        }

        if (effectiveIsLiveMode) {
          try {
            const res = await fetch('/api/action', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: item.id || item._id, type }) });
            const data = await res.json();
            if (data.stats) {
              setLiveStats(data.stats);
            }
          } catch (e) { console.error("DB Update Failed"); }
          const statKeyFE = { tweet: 'tweets', retweet: 'retweets', quote: 'quotes', reply: 'replies' }[type] || (type + 's');
          setLiveUserStats(prev => ({ ...prev, [statKeyFE]: (prev[statKeyFE] || 0) + 1 }));
          setLiveTotalClicks(prev => prev + 1);
        } else {
          const statKeyFE = { tweet: 'tweets', retweet: 'retweets', quote: 'quotes', reply: 'replies' }[type] || (type + 's');
          setDemoStats(prev => ({ ...prev, [statKeyFE]: (prev[statKeyFE] || 0) + 1 }));
          setDemoUserStats(prev => ({ ...prev, [statKeyFE]: (prev[statKeyFE] || 0) + 1 }));
          setDemoTotalClicks(prev => prev + 1);
          setDemoCompletedIds(prev => [...prev, item.id || item._id]);
        }

        setCelebration({ type, id: Date.now() });

        setCombo(prev => prev + 1);
        if (comboTimerRef.current) clearTimeout(comboTimerRef.current);
        comboTimerRef.current = setTimeout(() => setCombo(0), 10000);

        const ua = typeof navigator !== 'undefined' ? navigator.userAgent || '' : '';
        const isMobileUa = /Android|iPhone|iPad|iPod/i.test(ua);
        const openDelayMs = isMobileUa ? 0 : 400;

        const finalId = item.targetId || extractTweetId(item.postLink) || '1234567890';
        let autoContent = getPreferredContent(item);
        let url = '';
        let clipPlain = '';

        const prepareIntentText = (txt) => {
          let s = String(txt || '');
          if (isMobileUa) {
            s = s.replace(/\n\n+/g, '\n').replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();
          }
          const maxEnc = /Android/i.test(ua) ? 768 : 1900;
          while (s.length > 24 && encodeURIComponent(s).length > maxEnc) {
            const sp = s.lastIndexOf(' ');
            s = sp > 48 ? s.slice(0, sp).trim() : s.slice(0, Math.floor(s.length * 0.88)).trim();
          }
          return s;
        };

        if (type === 'tweet') {
          clipPlain = prepareIntentText(autoContent);
          url = `https://x.com/intent/tweet?text=${encodeURIComponent(clipPlain)}`;
        } else if (type === 'retweet') {
          url = `https://twitter.com/intent/retweet?tweet_id=${finalId}`;
        } else if (type === 'quote') {
          let comment = stripTweetUrlsForId(autoContent, finalId);
          if (item.postLink) {
            try {
              const pl = String(item.postLink).trim();
              if (pl) comment = comment.replace(new RegExp(pl.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), '').trim();
            } catch (_) { }
          }
          const permalink = `https://x.com/i/web/status/${finalId}`;
          const currentTag = (watchdogInfo.hashtag || '#Declare_RRBNTPC2024_Result').trim() || '#Declare_RRBNTPC2024_Result';
          const mandatoryTag = currentTag.startsWith('#') ? currentTag : `#${currentTag}`;
          const hasTag = new RegExp(`(^|\\s)${mandatoryTag.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}(?=\\s|$)`, 'i').test(comment);
          if (!hasTag) comment = `${comment} ${mandatoryTag}`.trim();
          const sep = '\n\n';
          const maxComment = Math.max(0, 280 - sep.length - permalink.length);
          if (comment.length > maxComment) {
            comment = comment.slice(0, Math.max(0, maxComment - 3)).trim().replace(/[.,!?\s]+$/g, '') + '...';
            if (!new RegExp(`(^|\\s)${mandatoryTag.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}(?=\\s|$)`, 'i').test(comment)) {
              const reserve = Math.max(0, maxComment - (mandatoryTag.length + 1));
              comment = `${comment.slice(0, reserve).trim()} ${mandatoryTag}`.trim();
            }
          }
          const full = comment ? `${comment}${sep}${permalink}` : permalink;
          clipPlain = prepareIntentText(full);
          url = `https://x.com/intent/tweet?text=${encodeURIComponent(clipPlain)}`;
        } else if (type === 'reply') {
          clipPlain = prepareIntentText(autoContent);
          url = `https://x.com/intent/tweet?in_reply_to=${finalId}&text=${encodeURIComponent(clipPlain)}`;
        }

        // Detect Telegram in-app browser
        const isTelegramWebView = /Telegram/i.test(ua) || /TelegramBot/i.test(ua) || (window.TelegramWebviewProxy !== undefined);

        // Also copy to clipboard as safety net
        if (clipPlain) {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(clipPlain).catch(() => { });
          }
          try {
            const ta = document.createElement('textarea');
            ta.value = clipPlain;
            ta.setAttribute('readonly', '');
            ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px;opacity:0';
            document.body.appendChild(ta);
            ta.select();
            ta.setSelectionRange(0, clipPlain.length);
            document.execCommand('copy');
            document.body.removeChild(ta);
          } catch (_) { }
        }

        const executeOpen = () => {
          if (!url) return;
          window.open(url, '_blank', 'noopener,noreferrer');
        };

        if (openDelayMs > 0) {
          setTimeout(executeOpen, openDelayMs);
        } else {
          executeOpen();
        }

        if (celebrationTimerRef.current) clearTimeout(celebrationTimerRef.current);
        celebrationTimerRef.current = setTimeout(() => {

                document.removeEventListener('visibilitychange', onVisibilityChange);
                setTimeout(() => setCelebration(null), 1500); // Give them 1.5s to see it once they return
              }

            document.addEventListener('visibilitychange', onVisibilityChange);
          } else {
            setCelebration(null);
          }
        }, 2800);

      useEffect(() => {

                    Telegram's internal browser blocks Twitter features. To participate in the campaign, please open this app in Chrome.

                  }}
                  className="w-full bg-[#1DA1F2] hover:bg-blue-500 text-white font-black py-4 rounded-xl text-lg flex items-center justify-center gap-2 transform transition-all active:scale-95 shadow-[0_10px_30px_rgba(29,161,242,0.3)]"
                >
                  🚀 OPEN IN CHROME

                <p className="text-gray-500 text-xs mt-6">If button fails, tap <b>⋮</b> (Top Right) > <b>Open in Browser</b></p>

          {/* Admin Telegram Alerts Layer */}
          {(config.adminAlert === 'broadcast' || config.adminAlert === 'boost') && dismissedAlertType !== config.adminAlert && (

              <div
                className={`relative overflow-hidden pointer-events-auto max-w-3xl w-full p-[2px] rounded-2xl animate-slide-down-bounce border border-gray-700/50 shadow-[0_25px_80px_rgba(0,0,0,0.7)] ${
                  config.adminAlert === 'boost'

                style={config.adminAlert === 'boost' ? { animation: 'slide-down-bounce 0.6s cubic-bezier(0.22,1,0.36,1) forwards, boost-pulse 1.2s infinite 0.7s' } : {}}
              >
                <div className="shining-overlay" />
                <div className="bg-[#15202B]/95 rounded-[14px] p-4 md:p-5 flex items-start gap-3 md:gap-4 relative z-10 backdrop-blur-sm">
                  <div className={`p-3 rounded-xl mt-1 ${config.adminAlert === 'boost' ? 'bg-red-500/20' : 'bg-blue-500/20'}`}>

                    <X className="w-6 h-6" />

                </div>
              </div>
            </div>

                        <div className="flex gap-2 mb-2">
                          <input placeholder="Tweets" value={demoManualInputs.tweets} onChange={(e) => setDemoManualInputs({ ...demoManualInputs, tweets: e.target.value })} className="w-1/4 bg-black/50 border border-gray-700 rounded-lg px-2 py-2 text-blue-400 text-sm text-center" />
                          <input placeholder="Retweets" value={demoManualInputs.retweets} onChange={(e) => setDemoManualInputs({ ...demoManualInputs, retweets: e.target.value })} className="w-1/4 bg-black/50 border border-gray-700 rounded-lg px-2 py-2 text-green-400 text-sm text-center" />
                          <input placeholder="Quotes" value={demoManualInputs.quotes} onChange={(e) => setDemoManualInputs({ ...demoManualInputs, quotes: e.target.value })} className="w-1/4 bg-black/50 border border-gray-700 rounded-lg px-2 py-2 text-purple-400 text-sm text-center" />
                          <input placeholder="Replies" value={demoManualInputs.replies} onChange={(e) => setDemoManualInputs({ ...demoManualInputs, replies: e.target.value })} className="w-1/4 bg-black/50 border border-gray-700 rounded-lg px-2 py-2 text-orange-400 text-sm text-center" />
                        </div>
                        <button onClick={handleDemoManualStats} className="w-full bg-[#1DA1F2] hover:bg-blue-500 text-white font-bold py-2 rounded-lg transition-colors text-sm">Force Update DEMO Stats</button>
                      </div>
                      <div className="flex flex-col justify-between">
                        <div>
                          <h4 className="text-sm font-bold text-gray-400 uppercase tracking-widest mb-1">API Auto Fetch</h4>
                          <p className="text-xs text-gray-500 mb-2">Fetches actual counts automatically if Bearer Token is valid.</p>
                        </div>
                        <button onClick={handleWatchdogFetch} className="w-full bg-[#FFAD1F] hover:bg-yellow-500 text-black font-black py-3 rounded-lg transition-colors shadow-lg uppercase tracking-wide">Fetch Now</button>
                      </div>
                    </div>
                    {watchdogInfo.fetchLog && (
                      <div className="text-[10px] text-gray-500 font-mono mt-1 break-all">
                        Last Log: {watchdogInfo.fetchLog} {watchdogInfo.lastFetched && `(at ${new Date(watchdogInfo.lastFetched).toLocaleString()})`}
                      </div>
                    )}
                    <div className="flex flex-wrap gap-4 mt-2 text-xs font-bold text-gray-400">
                      <span>Current Ext Tweets: <span className="text-blue-400">{watchdogInfo.externalStats?.tweets || 0}</span></span>
                      <span>Retweets: <span className="text-green-400">{watchdogInfo.externalStats?.retweets || 0}</span></span>
                      <span>Replies: <span className="text-orange-400">{watchdogInfo.externalStats?.replies || 0}</span></span>
                      <span className="ml-auto text-[#1DA1F2]">Live Mode Watchdog Status: {watchdogInfo.enabled ? 'ACTIVE' : 'INACTIVE'}</span>
                    </div>
                  </div>

                  <div className="bg-[#192734] border border-[#1DA1F2]/30 rounded-2xl p-6 shadow-[0_0_15px_rgba(29,161,242,0.12)]">
                    <div className="flex items-start justify-between gap-4 flex-col md:flex-row">
                      <div>
                        <h3 className="text-xl font-bold text-white flex items-center gap-2 mb-1">
                          <Settings className="w-5 h-5 text-[#1DA1F2]" /> Hashtag / Tag Handler
                        </h3>
                        <p className="text-sm text-gray-500">Static & Dynamic tags manage karo. Checkbox tick = wo tag har message me hamesha rahega. System har message me <span className="text-gray-300 font-bold">3 random static + 1 random dynamic</span> shuffle karke add karta hai (pinned ke alawa).</p>
                      </div>
                      <button onClick={saveTagSettings} className="bg-[#1DA1F2] hover:bg-blue-500 text-white font-black px-5 py-2.5 rounded-xl transition-colors shadow-lg uppercase tracking-widest text-xs">
                        Save Hashtag Settings
                      </button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-5">
                      <div className="bg-black/30 p-4 rounded-xl border border-gray-800">
                        <div className="flex items-center justify-between mb-3">
                          <h4 className="text-sm font-bold text-gray-300 uppercase tracking-widest">Static Tags</h4>
                          <button
                            type="button"
                            onClick={() => {
                              const val = document.getElementById('addStaticTagInput')?.value || '';
                              upsertTag('static', val, false);
                              if (document.getElementById('addStaticTagInput')) document.getElementById('addStaticTagInput').value = '';
                            }}
                            className="bg-gray-800 hover:bg-gray-700 text-white font-bold px-3 py-1.5 rounded-lg text-xs"
                          >
                            + Add
                          </button>
                        </div>
                        <div className="flex gap-2 mb-3">
                          <input id="addStaticTagInput" placeholder="@RailTel" className="flex-1 bg-black/40 border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-[#1DA1F2] text-sm" />
                        </div>
                        <div className="space-y-2 max-h-56 overflow-y-auto pr-2">
                          {(tagSettings.static || []).map((t, idx) => (
                            <div key={(t.tag || '') + idx} className="flex items-center justify-between gap-2 bg-black/20 border border-gray-800 rounded-lg px-3 py-2">
                              <label className="flex items-center gap-2 cursor-pointer select-none">
                                <input type="checkbox" checked={!!t.pinned} onChange={() => togglePinned('static', t.tag)} className="accent-[#1DA1F2] w-4 h-4" />
                                <span className="text-sm text-white font-mono">{t.tag}</span>
                                {t.pinned && <span className="text-[10px] text-green-400 font-bold bg-green-500/10 px-2 py-0.5 rounded border border-green-500/20">ALWAYS</span>}
                              </label>
                              <button onClick={() => removeTag('static', t.tag)} className="text-red-400 hover:bg-red-500/10 px-2 py-1 rounded-md text-xs font-bold">
                                Remove
                              </button>
                            </div>
                          ))}
                          {(tagSettings.static || []).length === 0 && <div className="text-xs text-gray-500">No static tags saved.</div>}
                        </div>
                      </div>

                      <div className="bg-black/30 p-4 rounded-xl border border-gray-800">
                        <div className="flex items-center justify-between mb-3">
                          <h4 className="text-sm font-bold text-gray-300 uppercase tracking-widest">Dynamic Tags</h4>
                          <button
                            type="button"
                            onClick={() => {
                              const val = document.getElementById('addDynamicTagInput')?.value || '';
                              upsertTag('dynamic', val, false);
                              if (document.getElementById('addDynamicTagInput')) document.getElementById('addDynamicTagInput').value = '';
                            }}
                            className="bg-gray-800 hover:bg-gray-700 text-white font-bold px-3 py-1.5 rounded-lg text-xs"
                          >
                            + Add
                          </button>
                        </div>
                        <div className="flex gap-2 mb-3">
                          <input id="addDynamicTagInput" placeholder="@PMOIndia" className="flex-1 bg-black/40 border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-[#1DA1F2] text-sm" />
                        </div>
                        <div className="space-y-2 max-h-56 overflow-y-auto pr-2">
                          {(tagSettings.dynamic || []).map((t, idx) => (
                            <div key={(t.tag || '') + idx} className="flex items-center justify-between gap-2 bg-black/20 border border-gray-800 rounded-lg px-3 py-2">
                              <label className="flex items-center gap-2 cursor-pointer select-none">
                                <input type="checkbox" checked={!!t.pinned} onChange={() => togglePinned('dynamic', t.tag)} className="accent-[#1DA1F2] w-4 h-4" />
                                <span className="text-sm text-white font-mono">{t.tag}</span>
                                {t.pinned && <span className="text-[10px] text-green-400 font-bold bg-green-500/10 px-2 py-0.5 rounded border border-green-500/20">ALWAYS</span>}
                              </label>
                              <button onClick={() => removeTag('dynamic', t.tag)} className="text-red-400 hover:bg-red-500/10 px-2 py-1 rounded-md text-xs font-bold">
                                Remove
                              </button>
                            </div>
                          ))}
                          {(tagSettings.dynamic || []).length === 0 && <div className="text-xs text-gray-500">No dynamic tags saved.</div>}
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="bg-[#192734] border border-[#1DA1F2]/30 rounded-2xl p-6">
                    <h3 className="text-xl font-bold text-white flex items-center gap-2 mb-6"><Plus className="w-6 h-6 text-[#1DA1F2]" /> Campaign Content Manager</h3>
                    <div className="flex flex-wrap gap-4 mb-6">
                      {['tweet', 'retweet', 'quote', 'reply'].map((t) => (
                        <label key={t} className={`flex-1 min-w-[120px] flex items-center justify-center gap-2 p-3 rounded-xl cursor-pointer border ${newItem.type === t ? 'bg-[#1DA1F2]/20 border-[#1DA1F2] text-white shadow-lg' : 'border-gray-700 text-gray-400 hover:bg-gray-800'}`}>
                          <input type="radio" name="type" value={t} checked={newItem.type === t} onChange={(e) => setNewItem({ ...newItem, type: e.target.value })} className="hidden" />
                          <span className="capitalize font-bold">{t}</span>
                        </label>
                      ))}
                    </div>

                    <form onSubmit={handleAddItem} className="space-y-4 border-b border-gray-800 pb-6 mb-6">
                      <h4 className="text-sm font-bold text-gray-400 uppercase tracking-wider">Option A: Single Card Entry</h4>
                      {(newItem.type === 'retweet' || newItem.type === 'quote' || newItem.type === 'reply') && (
                        <input required placeholder="Paste Direct Post Link (e.g., https://x.com/PMOIndia/status/12345...)" value={newItem.postLink} onChange={(e) => setNewItem({ ...newItem, postLink: e.target.value })} className="w-full bg-black/40 border border-gray-700 rounded-xl px-4 py-3 text-white focus:border-[#1DA1F2] outline-none" />
                      )}
                      <textarea required={newItem.type === 'tweet'} placeholder={newItem.type === 'tweet' ? "Draft Tweet text here..." : "Reply context / Custom content text (Optional)"} value={newItem.text} onChange={(e) => setNewItem({ ...newItem, text: e.target.value })} className="w-full bg-black/40 border border-gray-700 rounded-xl p-4 text-white focus:outline-none focus:border-[#1DA1F2] transition-colors h-24 resize-none" />
                      <button type="submit" className="w-full bg-[#1DA1F2] hover:bg-blue-500 text-white font-bold py-3 px-6 rounded-xl transition-colors shadow-lg">Add Single Entry to {effectiveIsLiveMode ? 'LIVE DB' : 'DEMO'} Data</button>
                    </form>

                    <div className="space-y-4">
                      <div className="flex items-center justify-between">
                        <h4 className="text-sm font-bold text-green-400 uppercase tracking-wider flex items-center gap-2"><Upload className="w-4 h-4" /> Option B: Quick Bulk Upload</h4>
                        <button type="button" onClick={loadDraftTemplate} className="text-xs font-bold text-blue-400 hover:text-blue-300 flex items-center gap-1 bg-blue-500/10 px-3 py-1.5 rounded-md"><FileText className="w-3 h-3" /> Load Format Draft</button>
                      </div>
                      <div className="text-xs text-gray-500 bg-black/30 p-3 rounded-lg border border-gray-800">
                        <span className="text-gray-300 font-bold block mb-1">Format to paste:</span>
                        For <strong>Tweets</strong>: Paste simple lines of text (Each line = 1 New Card).<br />
                        For <strong>Retweets / Quotes</strong>: Paste Direct Post Links line by line.<br />
                        For <strong>Replies</strong>: Paste <code>&lt;Post Link&gt; [Hit Tab] &lt;Reply Text&gt;</code> or just <code>&lt;Post Link&gt;</code>.
                      </div>
                      <textarea placeholder="Paste multiple lines here directly from Excel or Notepad..." value={bulkText} onChange={(e) => setBulkText(e.target.value)} className="w-full bg-black/40 border border-green-500/50 rounded-xl p-4 text-white focus:outline-none focus:border-green-500 transition-colors h-32 resize-none font-mono text-sm leading-relaxed" />
                      <button type="button" onClick={handleBulkUpload} className="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 px-6 rounded-xl transition-colors shadow-lg">Upload Bulk Data to {effectiveIsLiveMode ? 'LIVE DB' : 'DEMO'} Mode</button>
                    </div>

                    <div className="space-y-4 border-t border-gray-800 pt-6 mt-6">
                      <h4 className="text-sm font-bold text-purple-400 uppercase tracking-wider flex items-center gap-2"><Zap className="w-4 h-4" /> Option C: Combined 3-in-1 (Retweet + Quote + Reply)</h4>
                      <div className="text-xs text-gray-500 bg-black/30 p-3 rounded-lg border border-purple-500/20">
                        <span className="text-purple-300 font-bold block mb-1">⚡ Power Mode:</span>
                        Paste <strong>links</strong> (one per line). Each link will auto-create <strong>3 cards</strong>:<br />
                        <span className="text-green-400">1. Retweet</span> (plain, no message) + <span className="text-purple-400">2. Quote</span> (auto-generated message) + <span className="text-orange-400">3. Reply</span> (auto-generated message)
                      </div>
                      <textarea placeholder="Paste links here (one per line)...&#10;https://x.com/user/status/123...&#10;https://x.com/user/status/456..." value={comboLinks} onChange={(e) => setComboLinks(e.target.value)} className="w-full bg-black/40 border border-purple-500/50 rounded-xl p-4 text-white focus:outline-none focus:border-purple-500 transition-colors h-32 resize-none font-mono text-sm leading-relaxed" />
                      <button type="button" onClick={handleComboUpload} className="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-lg flex items-center justify-center gap-2">
                        <Zap className="w-5 h-5" /> Generate 3-in-1 Cards to {effectiveIsLiveMode ? 'LIVE DB' : 'DEMO'}
                      </button>
                    </div>
                  </div>

                  <div className="bg-[#192734] border border-gray-800 rounded-2xl p-6">
                    <h3 className="text-sm font-bold text-gray-400 uppercase tracking-wider mb-4">Manage Currently Active Content ({effectiveIsLiveMode ? 'LIVE' : 'DEMO'})</h3>
                    <div className="space-y-3 max-h-60 overflow-y-auto pr-2">
                      {[...tweets, ...retweets, ...quotes, ...replies].map(item => (
                        <div key={item.id || item._id} className="flex items-center justify-between bg-black/30 p-3 rounded-lg border border-gray-800">
                          <div>
                            <span className="text-xs bg-gray-800 text-gray-300 px-2 py-1 rounded uppercase mr-2">{item.type}</span>
                            <span className="text-sm text-white truncate max-w-md inline-block align-bottom">{item.text || item.postLink || 'No Content'}</span>
                          </div>
                          <button onClick={() => handleDeleteItem(item.type, item.id || item._id)} className="text-red-500 hover:bg-red-500/20 p-2 rounded-lg transition-colors"><X className="w-4 h-4" /></button>
                        </div>
                      ))}
                      {[...tweets, ...retweets, ...quotes, ...replies].length === 0 && <p className="text-gray-500 text-center py-4 text-sm">No items found in {effectiveIsLiveMode ? 'LIVE' : 'DEMO'} mode.</p>}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}
          <div className="text-center p-4 mt-8 opacity-70 text-sm font-semibold tracking-widest text-[#1DA1F2]">Made with ❤️ by Siddhartha</div>
          {effectiveIsLiveMode && (
            <div className="max-w-4xl mx-auto text-center px-4 pb-8 opacity-50 text-[10px] text-gray-400">
              Terms of Use: This website is a helper utility for generating tweet templates. By using this tool, you agree that you are solely responsible for the content posted from your account. We do not store any personal data or login credentials.
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
