<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission NTPC Result Campaign</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for compiling JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- SAARE STYLES YAHAN HAIN (No React Crash) -->
    <style>
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-marquee { display: inline-block; white-space: nowrap; animation: marquee 25s linear infinite; }
        
        @keyframes rotate-gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .premium-animated-border {
            background-image: linear-gradient(90deg, #1DA1F2, #7928CA, #FF007F, #1DA1F2, #17BF63);
            background-size: 300% 300%;
            animation: rotate-gradient 4s ease infinite;
        }

        @keyframes tier-pulse-gold {
            0%, 100% { box-shadow: 0 0 15px rgba(234,179,8,0.4); transform: scale(1); }
            50% { box-shadow: 0 0 35px rgba(234,179,8,0.8); transform: scale(1.01); }
        }
        .anim-tier-gold { animation: tier-pulse-gold 2.5s ease-in-out infinite; }

        @keyframes tier-pulse-plat {
            0%, 100% { box-shadow: 0 0 20px rgba(34,211,238,0.5); transform: scale(1); }
            50% { box-shadow: 0 0 45px rgba(34,211,238,0.9); transform: scale(1.02); }
        }
        .anim-tier-plat { animation: tier-pulse-plat 1.5s ease-in-out infinite; }

        .text-shadow-glow { text-shadow: 0 0 10px rgba(59, 130, 246, 0.8); }

        @keyframes float-up {
            0% { transform: translateY(20px) scale(0.8); opacity: 0; }
            20% { transform: translateY(0px) scale(1.1); opacity: 1; }
            80% { transform: translateY(-30px) scale(1); opacity: 1; }
            100% { transform: translateY(-50px) scale(0.9); opacity: 0; }
        }
        .animate-float-up { animation: float-up 2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }

        @keyframes banner-pop {
            0% { transform: scale(0.5) translateY(-100px); opacity: 0; }
            40% { transform: scale(1.1) translateY(10px); opacity: 1; }
            60% { transform: scale(0.95) translateY(0); opacity: 1; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        .animate-banner-pop { animation: banner-pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes starburst {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(3) rotate(90deg); opacity: 0; }
        }
        .animate-starburst { animation: starburst 1.5s ease-out forwards; }

        @keyframes slide-in-right {
            0% { transform: translateX(100%); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }
        .animate-slide-right { animation: slide-in-right 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .animate-shake { animation: shake 0.4s ease-in-out; }

        @keyframes map-float {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { transform: translateY(-60px) scale(1.5); opacity: 0; }
        }
        .map-particle {
            position: absolute;
            border-radius: 50%;
            animation: map-float 4s infinite linear;
            filter: blur(2px);
        }

        .confetti-particle {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 2px;
            left: 50%;
            top: 50%;
            opacity: 1;
        }
        @keyframes explode-particle {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(var(--rot)); opacity: 0; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #15202b; }
        ::-webkit-scrollbar-thumb { background: #38444d; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #1DA1F2; }
    </style>
</head>
<body class="bg-[#0B111A]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const IconWrapper = ({ children, className = '', ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
                {children}
            </svg>
        );

        const Twitter = (props) => <IconWrapper {...props}><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/></IconWrapper>;
        const TrendingUp = (props) => <IconWrapper {...props}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></IconWrapper>;
        const Users = (props) => <IconWrapper {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconWrapper>;
        const Heart = (props) => <IconWrapper {...props}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></IconWrapper>;
        const Repeat2 = (props) => <IconWrapper {...props}><path d="m2 9 3-3 3 3"/><path d="M13 18H7a2 2 0 0 1-2-2V6"/><path d="m22 15-3 3-3-3"/><path d="M11 6h6a2 2 0 0 1 2 2v10"/></IconWrapper>;
        const MessageCircle = (props) => <IconWrapper {...props}><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></IconWrapper>;
        const Settings = (props) => <IconWrapper {...props}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></IconWrapper>;
        const AlertTriangle = (props) => <IconWrapper {...props}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></IconWrapper>;
        const Zap = (props) => <IconWrapper {...props}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></IconWrapper>;
        const Award = (props) => <IconWrapper {...props}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></IconWrapper>;
        const X = (props) => <IconWrapper {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconWrapper>;
        const ShieldAlert = (props) => <IconWrapper {...props}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M12 8v4"/><path d="M12 16h.01"/></IconWrapper>;
        const Upload = (props) => <IconWrapper {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></IconWrapper>;
        const CheckCircle2 = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></IconWrapper>;
        const Activity = (props) => <IconWrapper {...props}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></IconWrapper>;
        const Lock = (props) => <IconWrapper {...props}><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></IconWrapper>;
        const Plus = (props) => <IconWrapper {...props}><path d="M5 12h14"/><path d="M12 5v14"/></IconWrapper>;
        const User = (props) => <IconWrapper {...props}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></IconWrapper>;
        const Star = (props) => <IconWrapper {...props}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></IconWrapper>;
        const Crown = (props) => <IconWrapper {...props}><path d="M2 4l3 12h14l3-12-6 7-4-7-4 7-6-7zm3 16h14"/></IconWrapper>;
        const Gem = (props) => <IconWrapper {...props}><path d="M6 3h12l4 6-10 13L2 9Z"/><path d="M11 3v19"/><path d="M13 3v19"/><path d="M2 9h20"/><path d="M6 3v6"/><path d="M18 3v6"/></IconWrapper>;
        const Trophy = (props) => <IconWrapper {...props}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7c0 6 6 8 6 8s6-2 6-8V2Z"/></IconWrapper>;
        const MapIcon = (props) => <IconWrapper {...props}><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21 3 6"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></IconWrapper>;
        const FileText = (props) => <IconWrapper {...props}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></IconWrapper>;

        // Helper: Extract ID from Twitter URL
        const extractTweetId = (url) => {
            if (!url) return '1234567890';
            const match = url.match(/\/status\/(\d+)/);
            return match ? match[1] : url.trim();
        };

        // --- MOCK DATA GENERATOR ---
        const generateMockCards = (type, count) => {
          return Array.from({ length: count }).map((_, i) => ({
            id: `${type}-${Date.now()}-${i}`,
            type: type,
            text: type === 'tweet' ? `Students ke future ke sath khilwad band karo. We want justice! Part ${i+1} 🚀 #MissionNTPCResult` : (type === 'retweet' ? `NTPC Results mein dhandhli nahi chalegi. Sabhi students sath aayein! (Tweet ${i+1}) 📚` : `Sir, students pareshan hain. Kripya NTPC results par dhyan dein! (Reply ${i+1}) #MissionNTPCResult`),
            postLink: type !== 'tweet' ? `https://twitter.com/teacher_${i+1}/status/123456789${i}` : '',
            targetId: `1234567890${i}`,
            completed: false
          }));
        };

        const INITIAL_TWEETS = generateMockCards('tweet', 25);
        const INITIAL_RETWEETS = generateMockCards('retweet', 22);
        const INITIAL_REPLIES = generateMockCards('reply', 20);

        const ACHIEVEMENTS = [
          { count: 5, name: "Bronze Tweeter 🥉", desc: "Shuruaat achi hui hai!" },
          { count: 15, name: "Silver Amplifier 🥈", desc: "Aap trend set kar rahe hain!" },
          { count: 30, name: "Gold Campaigner 🥇", desc: "Rukna nahi hai, you are on fire!" },
          { count: 50, name: "Diamond Legend 💎", desc: "Aapne toh system hila diya!" }
        ];

        const CARDS_PER_LEVEL = 10; 

        // Component: Animated Counter
        const AnimatedNumber = ({ value }) => {
          const [displayVal, setDisplayVal] = useState(value);
          const [isAnimating, setIsAnimating] = useState(false);

          useEffect(() => {
            if (value !== displayVal) {
              setIsAnimating(true);
              setDisplayVal(value);
              const timer = setTimeout(() => setIsAnimating(false), 300);
              return () => clearTimeout(timer);
            }
          }, [value, displayVal]);

          const formatNum = (n) => n >= 1000 ? (n/1000).toFixed(1) + 'K' : n;

          return (
            <span className={`transition-all duration-300 inline-block ${isAnimating ? 'text-green-400 scale-110 text-shadow-glow' : 'text-white'}`}>
              {formatNum(displayVal)}
            </span>
          );
        };

        // CANDY CRUSH LEVEL MAP COMPONENT
        const CandyCrushMap = ({ currentCards, activeTab, userTier }) => {
            const points = [
                {x: 5, y: 50}, {x: 15, y: 30}, {x: 25, y: 25}, {x: 35, y: 40},
                {x: 45, y: 70}, {x: 55, y: 75}, {x: 65, y: 60}, {x: 75, y: 30},
                {x: 85, y: 25}, {x: 95, y: 50}
            ];

            const pathD = `M ${points[0].x} ${points[0].y} ` + points.slice(1).map(p => `L ${p.x} ${p.y}`).join(' ');
            const completedCount = currentCards.filter(c => c.completed).length;

            let activePathD = '';
            if (completedCount > 0) {
                const activePoints = points.slice(0, completedCount === 10 ? 10 : completedCount + 1);
                activePathD = `M ${activePoints[0].x} ${activePoints[0].y} ` + activePoints.slice(1).map(p => `L ${p.x} ${p.y}`).join(' ');
            }

            const getThemeInfo = () => {
                if (activeTab === 'tweets') return { stroke: '#1DA1F2', bg: 'bg-[#1DA1F2]', border: 'border-[#1DA1F2]', shadow: 'shadow-[0_0_20px_rgba(29,161,242,0.8)]' };
                if (activeTab === 'retweets') return { stroke: '#17BF63', bg: 'bg-[#17BF63]', border: 'border-[#17BF63]', shadow: 'shadow-[0_0_20px_rgba(23,191,99,0.8)]' };
                return { stroke: '#FFAD1F', bg: 'bg-[#FFAD1F]', border: 'border-[#FFAD1F]', shadow: 'shadow-[0_0_20px_rgba(255,173,31,0.8)]' };
            };
            
            const getMapTierStyles = (tierName) => {
                switch(tierName) {
                    case 'Bronze': return { bg: 'linear-gradient(180deg, rgba(194, 65, 12, 0.4) 0%, #15202B 100%)', border: 'rgba(194, 65, 12, 0.5)', particle: '#ea580c' };
                    case 'Silver': return { bg: 'linear-gradient(180deg, rgba(156, 163, 175, 0.4) 0%, #15202B 100%)', border: 'rgba(156, 163, 175, 0.5)', particle: '#d1d5db' };
                    case 'Gold': return { bg: 'linear-gradient(180deg, rgba(234, 179, 8, 0.4) 0%, #15202B 100%)', border: 'rgba(234, 179, 8, 0.5)', particle: '#facc15' };
                    case 'Platinum': return { bg: 'linear-gradient(180deg, rgba(6, 182, 212, 0.4) 0%, #15202B 100%)', border: 'rgba(6, 182, 212, 0.5)', particle: '#22d3ee' };
                    case 'Diamond Legend': return { bg: 'linear-gradient(180deg, rgba(168, 85, 247, 0.4) 0%, #15202B 100%)', border: 'rgba(168, 85, 247, 0.6)', particle: '#d8b4fe' };
                    default: return { bg: 'linear-gradient(180deg, #192734 0%, #15202B 100%)', border: '#1f2937', particle: 'transparent' };
                }
            };

            const theme = getThemeInfo();
            const mapTier = getMapTierStyles(userTier.name);

            return (
                <div className="relative w-full h-32 md:h-40 mb-10 border rounded-3xl overflow-hidden shadow-[0_0_30px_rgba(0,0,0,0.5)] transition-all duration-1000" 
                     style={{ background: mapTier.bg, borderColor: mapTier.border }}>
                    
                    <div className="absolute inset-0 opacity-[0.03]" style={{backgroundImage: 'radial-gradient(circle at 2px 2px, white 1px, transparent 0)', backgroundSize: '20px 20px'}}></div>
                    
                    {userTier.name !== 'Bronze' && (
                        <React.Fragment>
                            <div className="map-particle w-6 h-6 left-[10%] top-[80%]" style={{ animationDelay: '0s', background: mapTier.particle }}></div>
                            <div className="map-particle w-4 h-4 left-[30%] top-[90%]" style={{ animationDelay: '2s', background: mapTier.particle }}></div>
                            <div className="map-particle w-8 h-8 left-[60%] top-[85%]" style={{ animationDelay: '1s', background: mapTier.particle }}></div>
                            <div className="map-particle w-5 h-5 left-[85%] top-[70%]" style={{ animationDelay: '3s', background: mapTier.particle }}></div>
                        </React.Fragment>
                    )}

                    <div className="absolute top-2 left-4 flex items-center gap-2 text-gray-400 font-bold uppercase tracking-widest text-[10px] z-10 drop-shadow-md">
                        <MapIcon className="w-4 h-4" /> Live Level Tracker
                    </div>

                    <svg className="absolute inset-0 w-full h-full pointer-events-none" preserveAspectRatio="none" viewBox="0 0 100 100">
                        <path d={pathD} stroke="rgba(255,255,255,0.15)" strokeWidth="1.5" fill="none" strokeDasharray="3 3" vectorEffect="non-scaling-stroke" strokeLinecap="round" strokeLinejoin="round" />
                        {completedCount > 0 && (
                            <path d={activePathD} stroke={theme.stroke} strokeWidth="4" fill="none" className="transition-all duration-1000 ease-in-out" vectorEffect="non-scaling-stroke" strokeLinecap="round" strokeLinejoin="round" />
                        )}
                    </svg>

                    {points.map((p, i) => {
                        const isCompleted = currentCards[i]?.completed;
                        const isActive = i === completedCount && currentCards.length > 0;

                        return (
                            <div key={i} className="absolute transform -translate-x-1/2 -translate-y-1/2" style={{ left: `${p.x}%`, top: `${p.y}%` }}>
                                {isActive && (
                                    <div className="absolute -top-12 left-1/2 transform -translate-x-1/2 animate-bounce drop-shadow-[0_0_10px_rgba(255,255,255,0.8)] z-30">
                                        <div className="text-3xl">🚀</div>
                                    </div>
                                )}
                                
                                <div className={`w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center font-black text-[10px] md:text-xs border-[3px] shadow-lg z-20 transition-all duration-500 ${
                                    isCompleted ? 'bg-green-500 border-green-300 text-white shadow-[0_0_20px_rgba(23,191,99,0.6)] scale-110' :
                                    isActive ? `${theme.bg} ${theme.border} text-white ${theme.shadow} animate-pulse scale-125` :
                                    'bg-[#0B111A] border-gray-700 text-gray-500 scale-90'
                                }`}>
                                    {isCompleted ? <CheckCircle2 className="w-5 h-5" /> : (i + 1)}
                                </div>
                            </div>
                        )
                    })}
                </div>
            )
        }

        // MAIN APP
        function App() {
          const [activeTab, setActiveTab] = useState('tweets');
          const [isLiveMode, setIsLiveMode] = useState(false);

          // DATA STATES
          const [demoStats, setDemoStats] = useState({ tweets: 12450, retweets: 8430, replies: 4210 });
          const [liveStats, setLiveStats] = useState({ tweets: 0, retweets: 0, replies: 0 });
          const stats = isLiveMode ? liveStats : demoStats;

          const [userStats, setUserStats] = useState({ tweets: 0, retweets: 0, replies: 0 }); 
          
          const [config, setConfig] = useState({
            isActive: true,
            breakingNews: "🚨 Mega Trend Started: Target 1 Million Tweets for #MissionNTPCResult! Keep Tweeting!",
            posterMessage: "Campaign temporarily paused. Hum jaldi wapas aayenge!",
            redAlertLine: "Campaign Halted" 
          });

          const [demoTweets, setDemoTweets] = useState(INITIAL_TWEETS);
          const [demoRetweets, setDemoRetweets] = useState(INITIAL_RETWEETS);
          const [demoReplies, setDemoReplies] = useState(INITIAL_REPLIES);

          const [liveTweets, setLiveTweets] = useState([]);
          const [liveRetweets, setLiveRetweets] = useState([]);
          const [liveReplies, setLiveReplies] = useState([]);

          const tweets = isLiveMode ? liveTweets : demoTweets;
          const retweets = isLiveMode ? liveRetweets : demoRetweets;
          const replies = isLiveMode ? liveReplies : demoReplies;

          const [demoLevels, setDemoLevels] = useState({ tweets: 1, retweets: 1, replies: 1 }); 
          const [liveLevels, setLiveLevels] = useState({ tweets: 1, retweets: 1, replies: 1 }); 
          const levels = isLiveMode ? liveLevels : demoLevels;

          const [combo, setCombo] = useState(0);
          const [totalClicks, setTotalClicks] = useState(0);
          const [celebration, setCelebration] = useState(null); 
          const [activeBadge, setActiveBadge] = useState(null);
          const [unlockedBadges, setUnlockedBadges] = useState([]);

          const [tapCount, setTapCount] = useState(0);
          const [showPasswordGate, setShowPasswordGate] = useState(false);
          const [passwordInput, setPasswordInput] = useState('');
          const [passError, setPassError] = useState(false);
          const [isAdminOpen, setIsAdminOpen] = useState(false);
          
          const [newItem, setNewItem] = useState({ type: 'tweet', text: '', postLink: '' }); 
          const [bulkText, setBulkText] = useState(''); 

          const tapTimerRef = useRef(null);
          const comboTimerRef = useRef(null);
          const badgeTimerRef = useRef(null);
          const celebrationTimerRef = useRef(null);

          const fetchLiveData = async () => {
            try {
              const res = await fetch('/api/live-data');
              if (res.ok) {
                const data = await res.json();
                if(data.config) setConfig(data.config);
                if(data.stats) setLiveStats(data.stats);
                
                if(data.content) {
                    const userCompleted = data.userProgress?.completedCardIds || [];
                    const applyProgress = (items) => items.map(item => ({
                      ...item, id: item._id,
                      completed: userCompleted.includes(item._id)
                    }));
                    setLiveTweets(applyProgress(data.content.filter(c => c.type === 'tweet')));
                    setLiveRetweets(applyProgress(data.content.filter(c => c.type === 'retweet')));
                    setLiveReplies(applyProgress(data.content.filter(c => c.type === 'reply')));
                }
                
                if(data.userProgress) {
                    setUserStats(data.userProgress.stats || { tweets: 0, retweets: 0, replies: 0 });

                return {

                try {

                    if(data.stats) setLiveStats(data.stats);

            } else {

                if (type === 'retweet') setDemoRetweets(markCompleted(demoRetweets));

              } else if (type === 'retweet') {
                url = `https://twitter.com/intent/retweet?tweet_id=${finalId}`;
              } else if (type === 'reply') {
                url = `https://twitter.com/intent/tweet?in_reply_to=${finalId}&text=${encodeURIComponent(item.replyText || item.text)}`;
              }

              badgeTimerRef.current = setTimeout(() => setActiveBadge(null), 4000);
            }

          useEffect(() => {
            if (isLiveMode && unlockedBadges.length > 0) {
              fetch('/api/user-progress/badges', {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},

              }).catch(() => {});

                          </p>
                        </div>

                        {isCompleted ? (
                          <button disabled className="w-full bg-green-500/10 text-green-500 border border-green-500/30 font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 cursor-not-allowed">
                            <CheckCircle2 className="w-5 h-5" /> Completed
                          </button>
                        ) : (
                          <button onClick={() => triggerAction(actionType, item)} className={`w-full bg-white/5 text-white border border-gray-700 hover:border-transparent font-bold py-3 px-4 rounded-xl transition-all flex items-center justify-center gap-2 group ${item.type === 'tweet' ? 'hover:bg-[#1DA1F2]' : (item.type === 'retweet' ? 'hover:bg-green-500' : 'hover:bg-orange-500')}`}>
                            <CardIcon className="w-5 h-5 group-hover:scale-110 transition-transform" /> {btnLabel}
                          </button>
                        )}
                      </div>
                    );
                  })}

                  {currentCards.length === 0 && (
                     <div className="col-span-full py-20 text-center text-gray-400 border border-dashed border-gray-800 rounded-2xl bg-[#192734]/50">
                       <div className="bg-yellow-500/20 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                         <Award className="w-8 h-8 text-yellow-500" />
                       </div>
                       <h3 className="text-2xl font-bold text-white mb-2">{isLiveMode ? "No Content Available" : "You are a Hero!"}</h3>
                       <p>{isLiveMode ? "Admin ne is level ke liye cards upload nahi kiye hain." : "Aapne is section ke saare cards complete kar diye hain. Keep it up!"}</p>
                     </div>
                  )}
                </div>
              </main>

              {combo > 1 && (
                <div className={`fixed bottom-6 right-6 z-40 bg-[#15202B] border ${combo >= 5 ? 'border-[#1DA1F2]' : 'border-gray-700'} rounded-2xl p-4 shadow-2xl transition-all transform hover:scale-105 flex items-center gap-4`}>
                  <div className="bg-gradient-to-br from-orange-400 to-red-600 w-12 h-12 rounded-xl flex items-center justify-center shadow-lg">
                    <Zap className="w-7 h-7 text-white fill-white animate-pulse" />
                  </div>
                  <div>
                    <h4 className="text-gray-400 text-xs font-bold uppercase tracking-wider">Streak Active</h4>
                    <div className="text-2xl font-black text-white">{combo}x <span className="text-orange-500">COMBO!</span></div>
                  </div>
                </div>
              )}

              {activeBadge && (
                <div className="fixed top-24 right-6 z-[9999] bg-gradient-to-r from-yellow-600 to-yellow-400 p-1 rounded-2xl shadow-[0_10px_40px_rgba(202,138,4,0.4)] animate-slide-right">
                  <div className="bg-[#15202B] rounded-xl p-4 flex items-center gap-4">
                    <div className="bg-yellow-500/20 p-3 rounded-full"><Award className="w-8 h-8 text-yellow-500" /></div>
                    <div>
                      <p className="text-yellow-500 text-xs font-bold uppercase tracking-wider mb-0.5">Achievement Unlocked!</p>
                      <h4 className="text-white font-bold text-lg">{activeBadge.name}</h4>
                      <p className="text-gray-400 text-sm">{activeBadge.desc}</p>
                    </div>
                  </div>
                </div>
              )}

              {celebration && (
                <div key={celebration.id} className="fixed inset-0 z-50 pointer-events-none flex flex-col items-center justify-center overflow-hidden">
                  <div className="absolute inset-0 bg-black/70 animate-[opacity_0.5s_ease-out_reverse_forwards]" />
                  <div className="absolute w-[800px] h-[800px] bg-[conic-gradient(from_0deg,transparent_0deg,rgba(255,255,255,0.1)_10deg,transparent_20deg)] rounded-full animate-starburst" />

                  <div className="relative z-10 flex flex-col items-center animate-banner-pop">
                    <div className={`px-10 py-4 rounded-3xl font-black text-4xl md:text-6xl text-white transform -rotate-2 shadow-[0_20px_50px_rgba(0,0,0,0.5)] border-4 border-white/20 backdrop-blur-sm ${celebration.type === 'tweet' ? 'bg-gradient-to-r from-blue-500 to-blue-700' : ''} ${celebration.type === 'retweet' ? 'bg-gradient-to-r from-green-500 to-green-700' : ''} ${celebration.type === 'reply' ? 'bg-gradient-to-r from-orange-500 to-orange-700' : ''}`}>
                      {celebration.type === 'tweet' && "🎉 TWEET SENT!"}
                      {celebration.type === 'retweet' && "🔁 RETWEETED!"}
                      {celebration.type === 'reply' && "💬 REPLIED!"}
                    </div>
                    <div className="mt-6 text-3xl font-bold text-yellow-400 drop-shadow-[0_0_10px_rgba(250,204,21,0.8)] animate-float-up flex items-center gap-2">
                      <span className="text-white">Redirecting...</span> 🚀
                    </div>
                  </div>

                  {Array.from({ length: 40 }).map((_, i) => {
                     const angle = Math.random() * Math.PI * 2;
                     const velocity = 100 + Math.random() * 300;
                     const tx = Math.cos(angle) * velocity;
                     const ty = Math.sin(angle) * velocity - 200; 
                     const colors = ['#1DA1F2', '#17BF63', '#FFAD1F', '#FFD700', '#FFFFFF'];
                     const color = colors[Math.floor(Math.random() * colors.length)];
                     return (
                      <div key={i} className="confetti-particle" style={{ backgroundColor: color, '--tx': `${tx}px`, '--ty': `${ty}px`, '--rot': `${Math.random() * 360}deg`, animation: `explode-particle 1.5s ease-out forwards` }} />
                    );
                  })}
                </div>
              )}

              {isAdminOpen && (
                <div className="fixed inset-0 z-[2000] bg-black/80 backdrop-blur-xl flex items-center justify-center p-4">
                  <div className="bg-[#15202B] border border-gray-700 rounded-3xl w-full max-w-5xl max-h-[95vh] overflow-y-auto shadow-2xl flex flex-col">
                    <div className="sticky top-0 bg-[#15202B] border-b border-gray-800 p-6 flex justify-between items-center z-10">
                      <div className="flex items-center gap-3 text-red-500">
                        <ShieldAlert className="w-8 h-8" />
                        <h2 className="text-2xl font-black uppercase tracking-widest">Admin Control Center</h2>
                      </div>
                      <button onClick={() => setIsAdminOpen(false)} className="p-2 hover:bg-gray-800 rounded-full text-gray-400 hover:text-white transition-colors">
                        <X className="w-6 h-6" />
                      </button>
                    </div>

                    <div className="p-6 space-y-8">
                      <div className="bg-[#192734] border border-gray-800 rounded-2xl p-6 flex flex-col md:flex-row items-start md:items-center justify-between gap-4 shadow-md">
                        <div>
                          <h3 className="text-lg font-bold text-white flex items-center gap-2 mb-1">
                            <Activity className="w-5 h-5 text-blue-400" /> System Mode Selection
                          </h3>
                          <p className="text-sm text-gray-500">Toggle between auto-updating Mock Data vs Real Database content.</p>
                        </div>
                        <div className="flex bg-black/40 p-1.5 rounded-xl border border-gray-800 shrink-0">
                          <button onClick={() => setIsLiveMode(false)} className={`px-6 py-2.5 rounded-lg font-bold text-sm transition-all ${!isLiveMode ? 'bg-[#1DA1F2] text-white shadow-lg' : 'text-gray-500 hover:text-white'}`}>Demo Mode</button>
                          <button onClick={() => setIsLiveMode(true)} className={`px-6 py-2.5 rounded-lg font-bold text-sm transition-all ${isLiveMode ? 'bg-red-500 text-white shadow-lg shadow-red-500/30' : 'text-gray-500 hover:text-white'}`}>LIVE Mode</button>
                        </div>
                      </div>

                      <div className="bg-[#192734] border border-gray-800 rounded-2xl p-6 flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                        <div>
                          <h3 className="text-lg font-bold text-white flex items-center gap-2 mb-1">
                            <Settings className="w-5 h-5 text-[#1DA1F2]" /> Campaign Kill Switch
                          </h3>
                          <p className="text-sm text-gray-500">Toggle to pause campaign & show emergency poster.</p>
                          <div className="mt-4">
                              <label className="text-xs font-bold text-gray-400 uppercase tracking-widest">Custom Red Alert Text:</label>
                              <input value={config.redAlertLine} onChange={(e) => setConfig({...config, redAlertLine: e.target.value})} className="w-full md:w-80 mt-1 bg-black/40 border border-gray-700 rounded-lg px-3 py-2 text-red-400 focus:outline-none focus:border-red-500 text-sm font-bold" />
                          </div>
                        </div>
                        <button onClick={handleConfigToggle} className={`relative inline-flex h-10 w-20 items-center rounded-full transition-colors ${config.isActive ? 'bg-green-500' : 'bg-red-500'}`}>
                          <span className={`inline-block h-8 w-8 transform rounded-full bg-white transition-transform ${config.isActive ? 'translate-x-10' : 'translate-x-1'}`} />
                        </button>
                      </div>

                      <div className="bg-[#192734] border border-[#1DA1F2]/30 rounded-2xl p-6">
                        <h3 className="text-xl font-bold text-white flex items-center gap-2 mb-6"><Plus className="w-6 h-6 text-[#1DA1F2]" /> Campaign Content Manager</h3>
                        <div className="flex gap-4 mb-6">
                            {['tweet', 'retweet', 'reply'].map((t) => (
                              <label key={t} className={`flex-1 flex items-center justify-center gap-2 p-3 rounded-xl cursor-pointer border ${newItem.type === t ? 'bg-[#1DA1F2]/20 border-[#1DA1F2] text-white shadow-lg' : 'border-gray-700 text-gray-400 hover:bg-gray-800'}`}>
                                <input type="radio" name="type" value={t} checked={newItem.type === t} onChange={(e) => setNewItem({...newItem, type: e.target.value})} className="hidden" />
                                <span className="capitalize font-bold">{t}</span>
                              </label>
                            ))}
                        </div>

                        <form onSubmit={handleAddItem} className="space-y-4 border-b border-gray-800 pb-6 mb-6">
                          <h4 className="text-sm font-bold text-gray-400 uppercase tracking-wider">Option A: Single Card Entry</h4>
                          {(newItem.type === 'retweet' || newItem.type === 'reply') && (
                             <input required placeholder="Paste Direct Post Link (e.g., https://x.com/PMOIndia/status/12345...)" value={newItem.postLink} onChange={(e) => setNewItem({...newItem, postLink: e.target.value})} className="w-full bg-black/40 border border-gray-700 rounded-xl px-4 py-3 text-white focus:border-[#1DA1F2] outline-none" />
                          )}
                          <textarea required={newItem.type === 'tweet'} placeholder={newItem.type === 'tweet' ? "Draft Tweet text here..." : "Reply context / Custom content text (Optional)"} value={newItem.text} onChange={(e) => setNewItem({...newItem, text: e.target.value})} className="w-full bg-black/40 border border-gray-700 rounded-xl p-4 text-white focus:outline-none focus:border-[#1DA1F2] transition-colors h-24 resize-none" />
                          <button type="submit" className="w-full bg-[#1DA1F2] hover:bg-blue-500 text-white font-bold py-3 px-6 rounded-xl transition-colors shadow-lg">Add Single Entry to {isLiveMode ? 'LIVE DB' : 'DEMO'} Data</button>
                        </form>

                        <div className="space-y-4">
                          <div className="flex items-center justify-between">
                              <h4 className="text-sm font-bold text-green-400 uppercase tracking-wider flex items-center gap-2"><Upload className="w-4 h-4" /> Option B: Quick Bulk Upload</h4>
                              <button type="button" onClick={loadDraftTemplate} className="text-xs font-bold text-blue-400 hover:text-blue-300 flex items-center gap-1 bg-blue-500/10 px-3 py-1.5 rounded-md"><FileText className="w-3 h-3" /> Load Format Draft</button>
                          </div>
                          <div className="text-xs text-gray-500 bg-black/30 p-3 rounded-lg border border-gray-800">
                             <span className="text-gray-300 font-bold block mb-1">Format to paste:</span>
                             For <strong>Tweets</strong>: Paste simple lines of text (Each line = 1 New Card).<br/>
                             For <strong>Retweets</strong>: Paste Direct Post Links line by line.<br/>
                             For <strong>Replies</strong>: Paste <code>&lt;Post Link&gt; [Hit Tab] &lt;Reply Text&gt;</code> or just <code>&lt;Post Link&gt;</code>.
                          </div>
                          <textarea placeholder="Paste multiple lines here directly from Excel or Notepad..." value={bulkText} onChange={(e) => setBulkText(e.target.value)} className="w-full bg-black/40 border border-green-500/50 rounded-xl p-4 text-white focus:outline-none focus:border-green-500 transition-colors h-32 resize-none font-mono text-sm leading-relaxed" />
                          <button type="button" onClick={handleBulkUpload} className="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 px-6 rounded-xl transition-colors shadow-lg">Upload Bulk Data to {isLiveMode ? 'LIVE DB' : 'DEMO'} Mode</button>
                        </div>
                      </div>

                      <div className="bg-[#192734] border border-gray-800 rounded-2xl p-6">
                        <h3 className="text-sm font-bold text-gray-400 uppercase tracking-wider mb-4">Manage Currently Active Content ({isLiveMode ? 'LIVE' : 'DEMO'})</h3>
                        <div className="space-y-3 max-h-60 overflow-y-auto pr-2">
                          {[...tweets, ...retweets, ...replies].map(item => (
                            <div key={item.id || item._id} className="flex items-center justify-between bg-black/30 p-3 rounded-lg border border-gray-800">
                              <div>
                                <span className="text-xs bg-gray-800 text-gray-300 px-2 py-1 rounded uppercase mr-2">{item.type}</span>
                                <span className="text-sm text-white truncate max-w-md inline-block align-bottom">{item.text || item.postLink || 'No Content'}</span>
                              </div>
                              <button onClick={() => handleDeleteItem(item.type, item.id || item._id)} className="text-red-500 hover:bg-red-500/20 p-2 rounded-lg transition-colors"><X className="w-4 h-4" /></button>
                            </div>
                          ))}
                          {[...tweets, ...retweets, ...replies].length === 0 && <p className="text-gray-500 text-center py-4 text-sm">No items found in {isLiveMode ? 'LIVE' : 'DEMO'} mode.</p>}
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
